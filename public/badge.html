<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Status</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:transparent;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.badge{display:inline-flex;align-items:center;gap:12px;padding:14px 20px;border-radius:50px;border:1.5px solid transparent;transition:all 0.4s}
.badge.available{background:#e6f5ee;border-color:#b2dfc7}
.badge.unavailable{background:#fdf0ee;border-color:#f0c4be}
.pulse{width:10px;height:10px;border-radius:50%;flex-shrink:0;position:relative}
.pulse::after{content:'';position:absolute;inset:0;border-radius:50%;animation:ripple 1.8s ease-out infinite}
.available .pulse,.available .pulse::after{background:#22c063}
.unavailable .pulse,.unavailable .pulse::after{background:#c0392b;animation:none}
@keyframes ripple{0%{transform:scale(1);opacity:0.7}100%{transform:scale(2.8);opacity:0}}
.text{display:flex;flex-direction:column}
.title{font-size:14px;font-weight:600;line-height:1.2}
.available .title{color:#1a7a4a}
.unavailable .title{color:#c0392b}
.sub{font-size:11px;color:#9e9c9a;font-family:'DM Mono',monospace;margin-top:2px}
</style>
</head>
<body>
<div class="badge" id="badge">
  <div class="pulse"></div>
  <div class="text">
    <span class="title" id="title">Loading...</span>
    <span class="sub" id="sub"></span>
  </div>
</div>
<script>
function toMins(t){const[h,m]=t.split(':').map(Number);return h*60+m}
function fmt12(t){const[h,m]=t.split(':').map(Number);const ap=h>=12?'PM':'AM';const h12=h%12||12;return m===0?`${h12}:00 ${ap}`:`${h12}:${String(m).padStart(2,'0')} ${ap}`}
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function update() {
  fetch('/api/status').then(r=>r.json()).then(({open,schedule,nextEvent})=>{
    const badge=document.getElementById('badge');
    badge.className='badge '+(open?'available':'unavailable');
    document.getElementById('title').textContent=open?'Delivery available now':'Not available right now';
    let sub='';
    if(open&&nextEvent){sub=`Open until ${fmt12(nextEvent.time)}`}
    else if(!open&&nextEvent){const lbl=nextEvent.daysAway===1?'Tomorrow':nextEvent.day;sub=`Opens ${lbl} at ${fmt12(nextEvent.time)}`}
    document.getElementById('sub').textContent=sub;
  }).catch(()=>{
    document.getElementById('title').textContent='Status unavailable';
  });
}
update();
setInterval(update, 60000);
</script>
</body>
</html>
